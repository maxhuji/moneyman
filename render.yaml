services:
  - type: web
    name: moneyman-dashboard
    env: node
    region: frankfurt
    plan: free
    buildCommand: bash render-build.sh
    startCommand: bash render-start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: WORKSHEET_NAME
        value: Moneyman
      - key: DASHBOARD_PASSWORD
        sync: false

services:
  # Dashboard web service
  - type: web
    name: moneyman-dashboard
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd dashboard && npm install && npm run build
    startCommand: cd dashboard && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: WORKSHEET_NAME
        value: Moneyman

  # Daily cron job for data scraping and export
  - type: cron
    name: moneyman-daily-scraper
    env: node
    region: frankfurt
    plan: free
    schedule: "0 6 * * *"  # Run daily at 6 AM UTC (8-9 AM Israel time)
    buildCommand: npm install && cd moneyman && npm install && cd ../dashboard && npm install
    startCommand: ./run-daily.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: WORKSHEET_NAME
        value: Moneyman
      - key: ACCOUNTS_JSON
        sync: false
      - key: TELEGRAM_API_KEY
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: DAYS_BACK
        value: "180"
      - key: TZ
        value: "Asia/Jerusalem"

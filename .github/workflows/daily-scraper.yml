name: Daily Transaction Scraper

on:
  schedule:
    # Run at 6:00 AM and 6:00 PM UTC (8-9 AM and 8-9 PM Israel time depending on DST)
    - cron: "0 6,18 * * *"
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore package files
        run: |
          ls -la package*.* || echo "No package files found"
          if [ -f package.json.scraper ]; then
            cp package.json.scraper package.json
            echo "✓ Copied package.json"
          fi
          if [ -f package-lock.json.scraper ]; then
            cp package-lock.json.scraper package-lock.json
            echo "✓ Copied package-lock.json"
          fi
          ls -la package*.json || echo "No package.json files after copy"

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libgbm1 \
            libasound2t64 \
            libxrandr2 \
            libpangocairo-1.0-0 \
            libgtk-3-0

      - name: Create config file
        run: |
          cat > moneyman.conf.jsonc << 'EOF'
          {
            "accounts": ${{ secrets.ACCOUNTS_JSON }},
            "storage": {
              "googleSheets": {
                "serviceAccountPrivateKey": "${{ secrets.GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY }}",
                "serviceAccountEmail": "${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}",
                "sheetId": "${{ secrets.GOOGLE_SHEET_ID }}",
                "worksheetName": "${{ secrets.WORKSHEET_NAME }}"
              }
            },
            "options": {
              "scraping": {
                "daysBack": 7,
                "transactionHashType": "moneyman",
                "hiddenDeprecations": ["transactionHashType"]
              },
              "notifications": {
                "telegram": {
                  "apiKey": "${{ secrets.TELEGRAM_API_KEY }}",
                  "chatId": "${{ secrets.TELEGRAM_CHAT_ID }}"
                }
              }
            }
          }
          EOF

      - name: Build
        run: npm run build

      - name: Run scraper
        run: node --import ./polyfill.js dst/index.js
        env:
          NODE_ENV: production

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Scraper failed. Check the logs above for details."

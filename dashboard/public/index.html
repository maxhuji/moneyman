<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Household Budget Dashboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Heebo", Arial,
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        color: white;
        margin-bottom: 40px;
      }

      .header h1 {
        font-size: 2.5em;
        margin-bottom: 10px;
      }

      .header .subtitle {
        font-size: 1.1em;
        opacity: 0.9;
      }

      .period-badge {
        display: inline-block;
        background: rgba(255, 255, 255, 0.2);
        padding: 8px 16px;
        border-radius: 20px;
        margin-top: 10px;
        font-size: 0.95em;
      }

      .summary-card {
        background: white;
        border-radius: 15px;
        padding: 30px;
        margin-bottom: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      .summary-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
      }

      .stat-box {
        text-align: center;
        padding: 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 10px;
        color: white;
      }

      .stat-box.clickable {
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .stat-box.clickable:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      }

      .stat-box.clickable::after {
        content: "👁️ Click to view all";
        font-size: 0.65em;
        opacity: 0;
        display: block;
        margin-top: 5px;
        transition: opacity 0.3s;
      }

      .stat-box.clickable:hover::after {
        opacity: 0.8;
      }

      .stat-label {
        font-size: 0.9em;
        opacity: 0.9;
        margin-bottom: 5px;
      }

      .stat-value {
        font-size: 2em;
        font-weight: bold;
      }

      .categories-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
      }

      .category-card {
        background: white;
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        transition: all 0.3s ease;
        cursor: pointer;
        position: relative;
      }

      .category-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }

      .category-card::after {
        content: "👁️ Click for details";
        position: absolute;
        top: 10px;
        right: 10px;
        font-size: 0.75em;
        opacity: 0;
        transition: opacity 0.3s;
        background: rgba(102, 126, 234, 0.1);
        padding: 4px 8px;
        border-radius: 8px;
      }

      .category-card:hover::after {
        opacity: 1;
      }

      .category-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }

      .category-name {
        font-size: 1.3em;
        font-weight: bold;
      }

      .category-percent {
        font-size: 1.5em;
        font-weight: bold;
      }

      .progress-bar {
        width: 100%;
        height: 20px;
        background: #e0e0e0;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 10px;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #4caf50 0%, #8bc34a 100%);
        transition: width 0.5s ease;
        border-radius: 10px;
      }

      .progress-fill.warning {
        background: linear-gradient(90deg, #ff9800 0%, #ffc107 100%);
      }

      .progress-fill.danger {
        background: linear-gradient(90deg, #f44336 0%, #e91e63 100%);
      }

      .category-amounts {
        display: flex;
        justify-content: space-between;
        font-size: 0.95em;
        color: #666;
      }

      /* Modal styles */
      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        animation: fadeIn 0.3s ease;
      }

      .modal.active {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background: white;
        border-radius: 20px;
        width: 90%;
        max-width: 800px;
        max-height: 85vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        animation: slideUp 0.3s ease;
      }

      .modal-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 25px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .modal-title {
        font-size: 1.8em;
        font-weight: bold;
      }

      .close-btn {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        font-size: 1.5em;
        cursor: pointer;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        transition: background 0.3s;
      }

      .close-btn:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      .modal-body {
        padding: 30px;
        overflow-y: auto;
      }

      .modal-summary {
        background: #f5f5f5;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 25px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 15px;
      }

      .modal-stat {
        text-align: center;
      }

      .modal-stat-label {
        font-size: 0.85em;
        color: #666;
        margin-bottom: 5px;
      }

      .modal-stat-value {
        font-size: 1.4em;
        font-weight: bold;
        color: #667eea;
      }

      .transactions-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .transaction-item {
        background: #fafafa;
        padding: 15px;
        border-radius: 10px;
        border-right: 4px solid #667eea;
        transition: all 0.2s;
      }

      .transaction-item:hover {
        background: #f0f0f0;
        transform: translateX(-3px);
      }

      .transaction-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      .transaction-desc {
        font-weight: 600;
        font-size: 1.05em;
        color: #333;
      }

      .transaction-amount {
        font-size: 1.2em;
        font-weight: bold;
        color: #f44336;
      }

      .transaction-details {
        font-size: 0.9em;
        color: #666;
        display: flex;
        gap: 15px;
      }

      .loading {
        text-align: center;
        color: white;
        font-size: 1.5em;
        padding: 50px;
      }

      .error {
        background: #f44336;
        color: white;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        margin-bottom: 20px;
      }

      .last-updated {
        text-align: center;
        color: white;
        margin-top: 20px;
        opacity: 0.8;
        font-size: 0.9em;
      }

      .month-selector {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
        margin: 20px 0;
      }

      .month-nav-btn {
        background: rgba(255, 255, 255, 0.2);
        border: 2px solid rgba(255, 255, 255, 0.3);
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1em;
        transition: all 0.3s ease;
      }

      .month-nav-btn:hover {
        background: rgba(255, 255, 255, 0.3);
        border-color: rgba(255, 255, 255, 0.5);
      }

      .month-nav-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .current-period {
        color: white;
        font-size: 1.1em;
        font-weight: 600;
        min-width: 280px;
        text-align: center;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes slideUp {
        from {
          transform: translateY(50px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .edit-btn {
        background: #9c27b0;
        color: white;
        border: none;
        padding: 5px 12px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 0.85em;
        transition: background 0.3s;
        margin-left: 10px;
      }

      .edit-btn:hover {
        background: #7b1fa2;
      }

      .transaction-item.excluded {
        opacity: 0.5;
        background: #f5f5f5;
        text-decoration: line-through;
      }

      .edit-modal-content {
        background: white;
        padding: 30px;
        border-radius: 15px;
        max-width: 500px;
        width: 90%;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      }

      .edit-modal h3 {
        color: #333;
        margin-bottom: 20px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        color: #666;
        margin-bottom: 8px;
        font-weight: 500;
      }

      .form-group select,
      .form-group input[type="checkbox"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 1em;
      }

      .form-group input[type="checkbox"] {
        width: auto;
        margin-right: 10px;
      }

      .checkbox-group {
        display: flex;
        align-items: center;
      }

      .form-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 25px;
      }

      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1em;
        transition: background 0.3s;
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .btn-primary:hover {
        opacity: 0.9;
      }

      .btn-secondary {
        background: #ddd;
        color: #333;
      }

      .btn-secondary:hover {
        background: #ccc;
      }

      @media (max-width: 768px) {
        .header h1 {
          font-size: 1.8em;
        }
        .categories-grid {
          grid-template-columns: 1fr;
        }
        .modal-content {
          width: 95%;
          max-height: 90vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>💰 Household Budget Dashboard</h1>
        <div class="subtitle">Track your monthly expenses</div>
        <div class="month-selector">
          <button class="month-nav-btn" onclick="previousMonth()">
            ◀ Previous
          </button>
          <div class="current-period" id="current-period">Loading...</div>
          <button class="month-nav-btn" id="next-btn" onclick="nextMonth()">
            Next ▶
          </button>
        </div>
        <div class="period-badge" id="period-badge">Billing Period</div>
      </div>

      <div id="error-message"></div>
      <div id="loading" class="loading">Loading budget data...</div>
      <div id="content" style="display: none">
        <div class="summary-card">
          <div class="summary-stats">
            <div class="stat-box">
              <div class="stat-label">Monthly Budget</div>
              <div class="stat-value" id="total-budget">₪0</div>
            </div>
            <div class="stat-box clickable" onclick="showAllTransactions()">
              <div class="stat-label">Total Spent</div>
              <div class="stat-value" id="total-spent">₪0</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">Remaining</div>
              <div class="stat-value" id="total-remaining">₪0</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">Budget Used</div>
              <div class="stat-value" id="total-percent">0%</div>
            </div>
          </div>
        </div>

        <div class="categories-grid" id="categories"></div>

        <div class="last-updated">
          Last updated: <span id="last-updated-time"></span>
        </div>
      </div>
    </div>

    <!-- Modal for transaction details -->
    <div id="transactionModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <div class="modal-title" id="modal-category-name"></div>
          <button class="close-btn" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
          <div class="modal-summary">
            <div class="modal-stat">
              <div class="modal-stat-label">Budget</div>
              <div class="modal-stat-value" id="modal-budget">₪0</div>
            </div>
            <div class="modal-stat">
              <div class="modal-stat-label">Spent</div>
              <div class="modal-stat-value" id="modal-spent">₪0</div>
            </div>
            <div class="modal-stat">
              <div class="modal-stat-label">Remaining</div>
              <div class="modal-stat-value" id="modal-remaining">₪0</div>
            </div>
            <div class="modal-stat">
              <div class="modal-stat-label">Used %</div>
              <div class="modal-stat-value" id="modal-percent">0%</div>
            </div>
          </div>
          <h3 style="margin-bottom: 15px">Transactions:</h3>
          <div class="transactions-list" id="transactions-list">
            <div style="text-align: center; color: #999">
              Loading transactions...
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Edit Transaction Modal -->
    <div id="editModal" class="modal">
      <div class="edit-modal-content">
        <h3>Edit Transaction</h3>
        <div id="edit-transaction-info" style="background: #f5f5f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9em;"></div>
        <div class="form-group">
          <label for="edit-category">Category:</label>
          <select id="edit-category">
            <option value="">Auto (keep default)</option>
            <option value="groceries">Groceries</option>
            <option value="restaurants">Restaurants</option>
            <option value="transportation">Transportation</option>
            <option value="housing">Housing</option>
            <option value="utilities">Utilities</option>
            <option value="shopping">Shopping</option>
            <option value="healthcare">Healthcare</option>
            <option value="entertainment">Entertainment</option>
            <option value="insurance">Insurance</option>
            <option value="travel">Travel</option>
            <option value="education">Education</option>
            <option value="therapy">Therapy</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <div class="checkbox-group">
            <input type="checkbox" id="edit-excluded">
            <label for="edit-excluded" style="margin-bottom: 0;">Exclude from budget calculations</label>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveTransaction()">Save</button>
        </div>
      </div>
    </div>

    <script>
      // Global state
      let currentMonthOffset = 0;
      let currentEditTransaction = null;
      let currentPeriodData = null;

      const categoryNames = {
        groceries: "Groceries",
        restaurants: "Restaurants",
        transportation: "Transportation",
        utilities: "Utilities",
        shopping: "Shopping",
        healthcare: "Healthcare",
        entertainment: "Entertainment",
        insurance: "Insurance",
        travel: "Travel",
        other: "Other",
        housing: "Housing",
        education: "Education",
        therapy: "Therapy",
      };

      function formatCurrency(amount) {
        return `₪${Math.round(amount).toLocaleString("he-IL")}`;
      }

      function getProgressColor(percent) {
        if (percent > 90) return "danger";
        if (percent > 75) return "warning";
        return "";
      }

      function formatDate(dateStr) {
        const [day, month, year] = dateStr.split("/");
        return `${day}/${month}/${year}`;
      }

      async function showAllTransactions() {
        const modal = document.getElementById("transactionModal");

        document.getElementById("modal-category-name").textContent =
          "All Transactions";
        document.getElementById("modal-budget").textContent = formatCurrency(
          window.currentBudgetData?.totalBudget || 0,
        );
        document.getElementById("modal-spent").textContent = formatCurrency(
          window.currentBudgetData?.totalSpent || 0,
        );
        document.getElementById("modal-remaining").textContent = formatCurrency(
          (window.currentBudgetData?.totalBudget || 0) -
            (window.currentBudgetData?.totalSpent || 0),
        );
        const percentUsed = window.currentBudgetData
          ? Math.round(
              (window.currentBudgetData.totalSpent /
                window.currentBudgetData.totalBudget) *
                100,
            )
          : 0;
        document.getElementById("modal-percent").textContent =
          `${percentUsed}%`;

        const transactionsList = document.getElementById("transactions-list");
        transactionsList.innerHTML =
          '<div style="text-align: center; color: #999;">Loading all transactions...</div>';

        modal.classList.add("active");

        try {
          const response = await fetch(
            `/api/transactions?offset=${currentMonthOffset}`,
          );
          const transactions = await response.json();

          // Backend already filters by date, category, deduplicates, and excludes internal transfers
          // Just sort by date here
          const expenses = transactions.sort((a, b) => {
            const dateA = parseDate(a.date);
            const dateB = parseDate(b.date);
            return dateB - dateA;
          });

          if (expenses.length === 0) {
            transactionsList.innerHTML =
              '<div style="text-align: center; color: #999;">No expenses for the billing period</div>';
            return;
          }

          // Group by category
          const groupedByCategory = expenses.reduce((acc, tx) => {
            const cat = tx.autoCategory || "other";
            if (!acc[cat]) acc[cat] = [];
            acc[cat].push(tx);
            return acc;
          }, {});

          transactionsList.innerHTML = Object.entries(groupedByCategory)
            .sort(([catA], [catB]) => {
              const sumA = groupedByCategory[catA].reduce(
                (sum, tx) => sum + Math.abs(parseFloat(tx.amount)),
                0,
              );
              const sumB = groupedByCategory[catB].reduce(
                (sum, tx) => sum + Math.abs(parseFloat(tx.amount)),
                0,
              );
              return sumB - sumA;
            })
            .map(([category, txs]) => {
              const categoryTotal = txs.reduce(
                (sum, tx) => sum + Math.abs(parseFloat(tx.amount)),
                0,
              );
              const categoryName = categoryNames[category] || category;
              return `
                            <div style="margin-bottom: 30px;">
                                <div style="font-weight: bold; font-size: 1.2em; margin-bottom: 10px; color: #667eea; border-bottom: 2px solid #667eea; padding-bottom: 5px;">
                                    ${categoryName} - ${formatCurrency(categoryTotal)}
                                </div>
                                ${txs
                                  .map(
                                    (tx) => `
                                    <div class="transaction-item ${tx.excluded === 'true' || tx.excluded === '1' ? 'excluded' : ''}">
                                        <div class="transaction-header">
                                            <div class="transaction-desc">${tx.description || "No description"}</div>
                                            <div style="display: flex; align-items: center;">
                                                <div class="transaction-amount">${formatCurrency(Math.abs(parseFloat(tx.amount)))}</div>
                                                <button class="edit-btn" onclick='openEditModal(${JSON.stringify(tx).replace(/'/g, "&apos;")})'>✏️ Edit</button>
                                            </div>
                                        </div>
                                        <div class="transaction-details">
                                            <span>📅 ${formatDate(tx.date)}</span>
                                            ${tx.memo ? `<span>📝 ${tx.memo}</span>` : ""}
                                            <span>💳 ${tx.account || "N/A"}</span>
                                            ${tx.manualCategory ? `<span>🏷️ Manual: ${tx.manualCategory}</span>` : ""}
                                        </div>
                                    </div>
                                `,
                                  )
                                  .join("")}
                            </div>
                        `;
            })
            .join("");
        } catch (error) {
          transactionsList.innerHTML =
            '<div style="text-align: center; color: #f44336;">Error loading transactions</div>';
        }
      }

      async function showCategoryDetails(categoryKey, categoryData) {
        const modal = document.getElementById("transactionModal");
        const categoryName = categoryNames[categoryKey] || categoryKey;

        document.getElementById("modal-category-name").textContent =
          categoryName;
        document.getElementById("modal-budget").textContent = formatCurrency(
          categoryData.budget,
        );
        document.getElementById("modal-spent").textContent = formatCurrency(
          categoryData.spent,
        );
        document.getElementById("modal-remaining").textContent = formatCurrency(
          categoryData.remaining,
        );
        document.getElementById("modal-percent").textContent =
          `${categoryData.percentUsed}%`;

        const transactionsList = document.getElementById("transactions-list");
        transactionsList.innerHTML =
          '<div style="text-align: center; color: #999;">Loading transactions...</div>';

        modal.classList.add("active");

        try {
          const response = await fetch(
            `/api/transactions/${categoryKey}?offset=${currentMonthOffset}`,
          );
          const transactions = await response.json();

          if (transactions.length === 0) {
            transactionsList.innerHTML =
              '<div style="text-align: center; color: #999;">No transactions in this category</div>';
            return;
          }

          // Backend already filters by date, category, deduplicates, and excludes internal transfers
          // Just sort by date here
          const expenses = transactions.sort((a, b) => {
            const dateA = parseDate(a.date);
            const dateB = parseDate(b.date);
            return dateB - dateA;
          });

          if (expenses.length === 0) {
            transactionsList.innerHTML =
              '<div style="text-align: center; color: #999;">No expenses in this category for the billing period</div>';
            return;
          }

          transactionsList.innerHTML = expenses
            .map(
              (tx) => `
                    <div class="transaction-item ${tx.excluded === 'true' || tx.excluded === '1' ? 'excluded' : ''}">
                        <div class="transaction-header">
                            <div class="transaction-desc">${tx.description || "No description"}</div>
                            <div style="display: flex; align-items: center;">
                                <div class="transaction-amount">${formatCurrency(Math.abs(parseFloat(tx.amount)))}</div>
                                <button class="edit-btn" onclick='openEditModal(${JSON.stringify(tx).replace(/'/g, "&apos;")})'>✏️ Edit</button>
                            </div>
                        </div>
                        <div class="transaction-details">
                            <span>📅 ${formatDate(tx.date)}</span>
                            ${tx.memo ? `<span>📝 ${tx.memo}</span>` : ""}
                            ${tx.manualCategory ? `<span>🏷️ Manual: ${tx.manualCategory}</span>` : ""}
                        </div>
                    </div>
                `,
            )
            .join("");
        } catch (error) {
          transactionsList.innerHTML =
            '<div style="text-align: center; color: #f44336;">Error loading transactions</div>';
        }
      }

      function closeModal() {
        document.getElementById("transactionModal").classList.remove("active");
      }

      function parseDate(dateStr) {
        const [day, month, year] = dateStr.split("/");
        return new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
      }

      function isInBillingPeriod(dateStr) {
        if (!currentPeriodData) return false;
        const txDate = parseDate(dateStr);
        const startDate = new Date(currentPeriodData.startDate);
        const endDate = new Date(currentPeriodData.endDate);
        return txDate >= startDate && txDate <= endDate;
      }

      function previousMonth() {
        currentMonthOffset--;
        loadDashboard();
      }

      function nextMonth() {
        if (currentMonthOffset < 0) {
          currentMonthOffset++;
          loadDashboard();
        }
      }

      async function loadDashboard() {
        try {
          document.getElementById("loading").style.display = "block";
          document.getElementById("content").style.display = "none";

          const response = await fetch(
            `/api/budget-summary?offset=${currentMonthOffset}`,
          );

          if (!response.ok) {
            throw new Error(
              "Failed to load budget data. Make sure to run the data export first.",
            );
          }

          const data = await response.json();

          // Store budget data globally
          window.currentBudgetData = data;
          currentPeriodData = data;

          // Update period display
          const periodStart = new Date(data.startDate);
          const periodEnd = new Date(data.endDate);
          const monthName = periodStart.toLocaleDateString("en-US", {
            month: "long",
            year: "numeric",
          });

          document.getElementById("current-period").textContent = monthName;
          document.getElementById("period-badge").textContent =
            `${data.month}`;

          // Update summary stats
          document.getElementById("total-budget").textContent = formatCurrency(
            data.totalBudget,
          );
          document.getElementById("total-spent").textContent = formatCurrency(
            data.totalSpent,
          );
          document.getElementById("total-remaining").textContent =
            formatCurrency(data.totalBudget - data.totalSpent);

          const totalPercent = Math.round(
            (data.totalSpent / data.totalBudget) * 100,
          );
          document.getElementById("total-percent").textContent =
            `${totalPercent}%`;

          // Update last updated time
          const lastUpdated = new Date(data.generatedAt);
          document.getElementById("last-updated-time").textContent =
            lastUpdated.toLocaleString("he-IL");

          // Render categories (sorted by spending, highest first)
          const categoriesContainer = document.getElementById("categories");
          categoriesContainer.innerHTML = "";

          // Filter out travel if budget is 0
          const filteredSummary = data.summary.filter(
            (cat) => cat.budget > 0 || cat.spent > 0,
          );

          filteredSummary
            .sort((a, b) => b.spent - a.spent)
            .forEach((category) => {
              const card = document.createElement("div");
              card.className = "category-card";
              card.onclick = () =>
                showCategoryDetails(category.category, category);

              const progressColor = getProgressColor(category.percentUsed);
              const categoryName =
                categoryNames[category.category] || category.category;
              const percentDisplay =
                category.percentUsed === null
                  ? "N/A"
                  : `${category.percentUsed}%`;
              const percentColor =
                category.percentUsed > 100
                  ? "#f44336"
                  : category.percentUsed > 75
                    ? "#ff9800"
                    : "#4caf50";

              card.innerHTML = `
                        <div class="category-header">
                            <div class="category-name">${categoryName}</div>
                            <div class="category-percent" style="color: ${percentColor}">${percentDisplay}</div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill ${progressColor}" style="width: ${Math.min(category.percentUsed || 0, 100)}%"></div>
                        </div>
                        <div class="category-amounts">
                            <span class="amount-spent">${formatCurrency(category.spent)} הוצאו</span>
                            <span class="amount-budget">מתוך ${formatCurrency(category.budget)}</span>
                        </div>
                    `;

              categoriesContainer.appendChild(card);
            });

          // Update navigation buttons
          const nextBtn = document.getElementById("next-btn");
          nextBtn.disabled = currentMonthOffset >= 0;

          // Hide loading, show content
          document.getElementById("loading").style.display = "none";
          document.getElementById("content").style.display = "block";
        } catch (error) {
          document.getElementById("loading").style.display = "none";
          document.getElementById("error-message").innerHTML = `
                    <div class="error">
                        <strong>שגיאה:</strong> ${error.message}
                    </div>
                `;
        }
      }

      function openEditModal(transaction) {
        currentEditTransaction = transaction;
        const modal = document.getElementById("editModal");
        const infoDiv = document.getElementById("edit-transaction-info");
        const categorySelect = document.getElementById("edit-category");
        const excludedCheckbox = document.getElementById("edit-excluded");

        // Display transaction info
        infoDiv.innerHTML = `
          <strong>${transaction.description}</strong><br>
          Amount: ${formatCurrency(Math.abs(parseFloat(transaction.amount)))}<br>
          Date: ${formatDate(transaction.date)}<br>
          Current Category: ${transaction.manualCategory || transaction.autoCategory}
        `;

        // Set current values
        categorySelect.value = transaction.manualCategory || "";
        excludedCheckbox.checked = transaction.excluded === "true" || transaction.excluded === "1";

        modal.classList.add("active");
      }

      function closeEditModal() {
        document.getElementById("editModal").classList.remove("active");
        currentEditTransaction = null;
      }

      async function saveTransaction() {
        if (!currentEditTransaction) return;

        const categorySelect = document.getElementById("edit-category");
        const excludedCheckbox = document.getElementById("edit-excluded");
        const saveBtn = event.target;

        const updates = {
          manualCategory: categorySelect.value || null,
          excluded: excludedCheckbox.checked,
        };

        // Disable button and show loading
        saveBtn.disabled = true;
        saveBtn.textContent = "Saving...";

        try {
          const response = await fetch(`/api/transactions/${currentEditTransaction.hash}`, {
            method: "PATCH",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(updates),
          });

          if (!response.ok) {
            throw new Error("Failed to update transaction");
          }

          // Close both modals and refresh data
          closeEditModal();
          closeModal();
          await loadDashboard();
        } catch (error) {
          console.error("Error updating transaction:", error);
          alert("Failed to update transaction. Please try again.");
          saveBtn.disabled = false;
          saveBtn.textContent = "Save";
        }
      }

      // Close modals when clicking outside
      window.onclick = function (event) {
        const transactionModal = document.getElementById("transactionModal");
        const editModal = document.getElementById("editModal");
        if (event.target === transactionModal) {
          closeModal();
        }
        if (event.target === editModal) {
          closeEditModal();
        }
      };

      // Load dashboard on page load
      loadDashboard();

      // Auto-refresh every 5 minutes
      setInterval(loadDashboard, 5 * 60 * 1000);
    </script>
  </body>
</html>
